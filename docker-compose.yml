version: '3.8'
services:
  # Nginx Load Balancer (Trafikni qabul qilib, backend nusxalariga bo'luvchi yagona nuqta)
  nginx:
    image: nginx:stable-alpine
    container_name: stuffus_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - erp_backend_1
      - erp_backend_2
      - erp_backend_3
    restart: unless-stopped
    networks:
      - stuffus_network
  # 1-Nusxa (Replica 1)
  erp_backend_1:
    build: .
    container_name: erp_backend_node_1
    environment:
      - PORT=5000
      - DB_HOST=dpg-d808kc8sfn5c739appug-a.virginia-postgres.render.com
      - DB_NAME=localhost_mvo8
      - DB_USER=wed
      - DB_PASSWORD=QSeRb83uaJvzLMdkLrXlOEBALwq8W9Z4  
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - stuffus_network
  # 2-Nusxa (Replica 2)
  erp_backend_2:
    build: .
    container_name: erp_backend_node_2
    environment:
      - PORT=5000
      - DB_HOST=dpg-d808kc8sfn5c739appug-a.virginia-postgres.render.com
      - DB_NAME=localhost_mvo8
      - DB_USER=wed
      - DB_PASSWORD=QSeRb83uaJvzLMdkLrXlOEBALwq8W9Z4  
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - stuffus_network

  # 3-Nusxa (Replica 3)
  erp_backend_3:
    build: .
    container_name: erp_backend_node_3
    environment:
      - PORT=5000
      - DB_HOST=dpg-d808kc8sfn5c739appug-a.virginia-postgres.render.com
      - DB_NAME=localhost_mvo8
      - DB_USER=wed
      - DB_PASSWORD=QSeRb83uaJvzLMdkLrXlOEBALwq8W9Z4  
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - stuffus_network

networks:
  stuffus_network:
    driver: bridge