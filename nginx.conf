user  nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ==========================================
    # 1. KESH SAQLASH JOYINI BELGILASH (YANGI)
    # ==========================================
    # Kesh /var/cache/nginx papkasida saqlanadi, xotirada 10mb joy (ERP_CACHE) ajratiladi.
    # Eng ko'p 1 gigabaytgacha kesh fayli yig'ilishi mumkin.
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=ERP_CACHE:10m max_size=1g inactive=60m use_temp_path=off;

    # ==========================================
    # 2. XAVFSIZLIK: KIMLAR KESHNI O'CHIRA OLADI (YANGI)
    # ==========================================
    # Faqat localhost va ichki docker tarmog'idan kelgan so'rovlargagina keshni o'chirishga ruxsat beramiz.
    geo $purge_allowed {
        default         0;
        127.0.0.1       1; # Localhost
        172.16.0.0/12   1; # Docker ichki tarmog'i (standart diapazon)
    }

    upstream app_server {
        server erp_backend_1:5000;
        server erp_backend_2:5000;
        server erp_backend_3:5000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 100M;

        # ==========================================
        # 3. KESHNI TOZALASH MANZILI (YANGI - PURGE LOCATION)
        # ==========================================
        # Masalan, backend /purge/static/logo.png ga so'rov yuborsa, o'sha fayl keshdan o'chadi.
        location ~ /purge(/.*) {
            if ($purge_allowed = 0) {
                return 403; # Ruxsat berilmagan IP-larga 'Taqiqlangan' xatoligini qaytaradi
            }
            # Kesh kaliti pastdagi statik fayllar bilan bir xil bo'lishi shart
            proxy_cache_purge ERP_CACHE "$scheme$request_method$host$1";
        }

        location / {
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Host $host;
            proxy_set_header   X-NginX-Proxy true;
            
            proxy_pass         http://app_server;
            
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_buffering    off;
        }

        # ==========================================
        # 4. STATIK FAYLLARNI KESHGA OLISH (O'ZGARTIRILDI)
        # ==========================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            proxy_pass http://app_server;
            
            # Keshni faollashtiramiz
            proxy_cache ERP_CACHE;
            
            # Kesh uchun unikal kalit (kalit qanday yaratilsa, purge ham shunday o'chiradi)
            # Statik fayllar odatda GET so'rovi bo'lgani uchun 'GET'ni qat'iy yozib qo'yamiz
            proxy_cache_key "$schemeGET$host$request_uri";
            
            # 200 (OK) va 302 kodli muvaffaqiyatli javoblarni 60 daqiqaga keshda saqlash
            proxy_cache_valid 200 302 60m;
            
            # Kesh holatini tekshirish uchun brauzerda maxsus header ko'rsatadi (HIT yoki MISS)
            add_header X-Cache-Status $upstream_cache_status;
            
            expires max;
            add_header Cache-Control "public";
        }
    }
}
